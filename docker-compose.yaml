services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fitness_tracker_service_db_1
      POSTGRES_USER: fitness_tracker_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness_tracker_user -d fitness_tracker_service_db_1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./postgresql/data/initial_data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION: postgresql://fitness_tracker_user:password@postgres:5432/fitness_tracker_service_db_1
    ports:
      - "8080:8080"

volumes:
  postgres_data:
