services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fitness_tracker_service_db_1
      POSTGRES_USER: fitness_tracker_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness_tracker_user -d fitness_tracker_service_db_1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: fitness_tracker_mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mongo_data:/data/db
      - ./validation.js:/docker-entrypoint-initdb.d/01-validation.js:ro
      - ./data.js:/docker-entrypoint-initdb.d/02-data.js:ro

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      DB_CONNECTION: postgresql://fitness_tracker_user:password@postgres:5432/fitness_tracker_service_db_1
      MONGO_CONNECTION: mongodb://mongo:27017/fitness_tracker_mongo
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  mongo_data:
