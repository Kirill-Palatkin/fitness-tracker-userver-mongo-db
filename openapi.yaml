openapi: 3.0.3
info:
  title: API сервиса фитнес-трекера
  version: 1.0.0
  description: REST API для 14 варианта задания по системному дизайну, реализованный на userver и PostgreSQL.
servers:
  - url: http://localhost:8080
tags:
  - name: Авторизация
  - name: Пользователи
  - name: Упражнения
  - name: Тренировки
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque token
  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    User:
      type: object
      required: [id, login, first_name, last_name]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string
    RegisterRequest:
      type: object
      required: [login, first_name, last_name, password]
      properties:
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        password:
          type: string
          minLength: 6
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string
    Exercise:
      type: object
      required: [id, name, muscle_group, calories_per_minute, description]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        muscle_group:
          type: string
        calories_per_minute:
          type: integer
        description:
          type: string
        created_by:
          type: integer
          format: int64
          nullable: true
    CreateExerciseRequest:
      type: object
      required: [name, muscle_group, calories_per_minute]
      properties:
        name:
          type: string
        muscle_group:
          type: string
        calories_per_minute:
          type: integer
          minimum: 1
        description:
          type: string
    Workout:
      type: object
      required: [id, user_id, title, planned_date, notes]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        title:
          type: string
        planned_date:
          type: string
          format: date
        notes:
          type: string
    CreateWorkoutRequest:
      type: object
      required: [title, planned_date]
      properties:
        title:
          type: string
        planned_date:
          type: string
          format: date
        notes:
          type: string
    AddWorkoutExerciseRequest:
      type: object
      required: [exercise_id, sets, reps, duration_minutes]
      properties:
        exercise_id:
          type: integer
          minimum: 1
        sets:
          type: integer
          minimum: 1
        reps:
          type: integer
          minimum: 1
        duration_minutes:
          type: integer
          minimum: 1
    WorkoutExercise:
      type: object
      required:
        [id, exercise_id, name, muscle_group, sets, reps, duration_minutes, calories_burned]
      properties:
        id:
          type: integer
          format: int64
        exercise_id:
          type: integer
          format: int64
        name:
          type: string
        muscle_group:
          type: string
        sets:
          type: integer
        reps:
          type: integer
        duration_minutes:
          type: integer
        calories_burned:
          type: number
          format: double
    WorkoutHistoryItem:
      type: object
      required:
        [id, title, planned_date, notes, total_duration_minutes, total_calories_burned, exercises]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        planned_date:
          type: string
          format: date
        notes:
          type: string
        total_duration_minutes:
          type: integer
        total_calories_burned:
          type: number
          format: double
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutExercise'
    WorkoutStatistics:
      type: object
      required:
        [from, to, workout_count, exercise_entries_count, total_exercise_minutes, total_calories_burned]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        workout_count:
          type: integer
        exercise_entries_count:
          type: integer
        total_exercise_minutes:
          type: integer
        total_calories_burned:
          type: number
          format: double
paths:
  /v1/auth/register:
    post:
      tags: [Авторизация]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  message:
                    type: string
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Логин уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/auth/login:
    post:
      tags: [Авторизация]
      summary: Аутентификация пользователя и создание токена сессии
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/users/by-login:
    get:
      tags: [Пользователи]
      summary: Поиск пользователя по логину
      parameters:
        - in: query
          name: login
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/users/search:
    get:
      tags: [Пользователи]
      summary: Поиск пользователей по маске имени и фамилии
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Результаты поиска
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
  /v1/exercises:
    get:
      tags: [Упражнения]
      summary: Получить список всех упражнений
      responses:
        '200':
          description: Список упражнений
          content:
            application/json:
              schema:
                type: object
                properties:
                  exercises:
                    type: array
                    items:
                      $ref: '#/components/schemas/Exercise'
    post:
      tags: [Упражнения]
      summary: Создать новое упражнение
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseRequest'
      responses:
        '201':
          description: Упражнение создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/workouts:
    post:
      tags: [Тренировки]
      summary: Создать тренировку
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        '201':
          description: Тренировка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/workouts/{workout_id}/exercises:
    post:
      tags: [Тренировки]
      summary: Добавить упражнение в существующую тренировку
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: workout_id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkoutExerciseRequest'
      responses:
        '201':
          description: Упражнение добавлено в тренировку
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  workout_id:
                    type: integer
                    format: int64
                  exercise_id:
                    type: integer
                    format: int64
                  sets:
                    type: integer
                  reps:
                    type: integer
                  duration_minutes:
                    type: integer
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Тренировка или упражнение не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/workouts/history:
    get:
      tags: [Тренировки]
      summary: Получить историю тренировок текущего пользователя
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: История тренировок
          content:
            application/json:
              schema:
                type: object
                properties:
                  workouts:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkoutHistoryItem'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/workouts/statistics:
    get:
      tags: [Тренировки]
      summary: Получить статистику тренировок за период
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Статистика тренировок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutStatistics'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
