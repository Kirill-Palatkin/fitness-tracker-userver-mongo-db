components_manager:
    task_processors:

        main-task-processor:
            worker_threads: $worker-threads

        fs-task-processor:
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: $server-port
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard

        dynamic-config:
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000
                POSTGRES_DEFAULT_COMMAND_CONTROL:
                    network_timeout_ms: 5000
                    statement_timeout_ms: 5000

        testsuite-support: {}

        http-client:
            load-enabled: $is-testing

        tests-control:
            load-enabled: $is-testing
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor
        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-register:
            path: /v1/auth/register
            method: POST
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-login:
            path: /v1/auth/login
            method: POST
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-user-by-login:
            path: /v1/users/by-login
            method: GET
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-user-search:
            path: /v1/users/search
            method: GET
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-exercise-create:
            path: /v1/exercises
            method: POST
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-exercise-list:
            path: /v1/exercises
            method: GET
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-workout-create:
            path: /v1/workouts
            method: POST
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-workout-exercise-add:
            path: /v1/workouts/{workout_id}/exercises
            method: POST
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-workout-history:
            path: /v1/workouts/history
            method: GET
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-workout-statistics:
            path: /v1/workouts/statistics
            method: GET
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-mongo-exercise-create:
            path: /v1/mongo/exercises
            method: POST
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        handler-mongo-exercise-list:
            path: /v1/mongo/exercises
            method: GET
            task_processor: main-task-processor
            url_trailing_slash: strict-match

        postgres-db-1:
            dbconnection: $dbconnection
            dbconnection#env: DB_CONNECTION
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            sync-start: true
            connlimit_mode: manual

        mongo-db-1:
            dbconnection: $mongo-connection
            dbconnection#env: MONGO_CONNECTION
            appname: fitness-tracker-service
            conn_timeout: 2s
            so_timeout: 10s
            queue_timeout: 1s
            initial_size: 2
            max_size: 16
            idle_limit: 8
            connecting_limit: 2
            stats_verbosity: terse
            dns_resolver: async

        dns-client:
            fs-task-processor: fs-task-processor
